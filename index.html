<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PnL ANALYTICS</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #06080c;
  --surface: #0c0f16;
  --card: #101520;
  --border: #1c2535;
  --accent: #7DF9AA;
  --accent2: #FF6B6B;
  --accent3: #FFD93D;
  --blue: #60A5FA;
  --text: #D4E0F0;
  --muted: #3D5070;
  --green: #7DF9AA;
  --red: #FF6B6B;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  min-height: 100vh;
}

/* Noise texture overlay */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: 0.4;
}

.app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

/* ── Header ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px; padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap; gap: 12px;
}

.brand { display: flex; align-items: center; gap: 14px; }
.brand-icon {
  width: 40px; height: 40px; background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 900; color: var(--bg);
  font-family: var(--mono);
}
.brand-name { font-family: var(--mono); font-size: 18px; letter-spacing: 3px; color: var(--accent); }
.brand-sub { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }

.header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

.badge-live {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 10px; color: var(--muted);
  letter-spacing: 2px;
}
.dot-live {
  width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
  transition: background 0.3s;
}
.dot-live.on { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── Buttons ── */
.btn {
  font-family: var(--mono); font-size: 11px; letter-spacing: 2px;
  padding: 8px 16px; cursor: pointer; border: 1px solid; transition: all 0.15s;
  background: transparent;
}
.btn-primary { border-color: var(--accent); color: var(--accent); }
.btn-primary:hover { background: rgba(125,249,170,0.1); box-shadow: 0 0 16px rgba(125,249,170,0.2); }
.btn-ghost { border-color: var(--border); color: var(--muted); }
.btn-ghost:hover { border-color: var(--text); color: var(--text); }
.btn:disabled { opacity: 0.3; pointer-events: none; }

/* ── Config panel ── */
.config {
  background: var(--surface); border: 1px solid var(--border);
  padding: 20px; margin-bottom: 24px; position: relative;
}
.config-label {
  position: absolute; top: -9px; left: 16px;
  background: var(--surface); padding: 0 8px;
  font-family: var(--mono); font-size: 9px; color: var(--accent); letter-spacing: 3px;
}
.config-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
@media(max-width:700px){ .config-grid { grid-template-columns: 1fr; } }

.field label {
  display: block; font-family: var(--mono); font-size: 9px;
  color: var(--muted); letter-spacing: 2px; margin-bottom: 6px;
}
.field input, .field select {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: var(--mono); font-size: 12px;
  padding: 9px 12px; outline: none; transition: border-color 0.2s;
}
.field input:focus, .field select:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--muted); }

.wallets-area { margin-bottom: 14px; }
.wallet-row { display: flex; gap: 8px; margin-bottom: 6px; }
.wallet-row input { flex: 1; }
.btn-sm {
  background: transparent; border: 1px solid var(--border); color: var(--muted);
  width: 34px; cursor: pointer; font-size: 14px; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.btn-sm:hover { border-color: var(--red); color: var(--red); }
.btn-add {
  background: transparent; border: 1px dashed var(--border); color: var(--muted);
  font-family: var(--mono); font-size: 9px; letter-spacing: 2px;
  padding: 7px; cursor: pointer; width: 100%; transition: all 0.15s;
}
.btn-add:hover { border-color: var(--accent); color: var(--accent); }

.config-bottom { display: flex; gap: 14px; align-items: flex-end; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); flex-wrap: wrap; }
.config-bottom .field { flex: 1; min-width: 140px; }

/* ── Period tabs ── */
.period-bar {
  display: flex; gap: 4px; margin-bottom: 20px;
  border-bottom: 1px solid var(--border); padding-bottom: 0;
}
.period-btn {
  font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
  padding: 9px 16px; background: transparent; border: none; color: var(--muted);
  cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: all 0.15s;
}
.period-btn:hover { color: var(--text); }
.period-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── KPI cards ── */
.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 12px; margin-bottom: 24px; }
.kpi {
  background: var(--card); border: 1px solid var(--border); padding: 16px 18px;
  position: relative; overflow: hidden;
}
.kpi::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.kpi.k-green::before { background: var(--green); }
.kpi.k-red::before { background: var(--red); }
.kpi.k-blue::before { background: var(--blue); }
.kpi.k-yellow::before { background: var(--accent3); }
.kpi.k-purple::before { background: #A78BFA; }

.kpi-label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 2px; margin-bottom: 8px; }
.kpi-value { font-family: var(--mono); font-size: 22px; font-weight: bold; line-height: 1; }
.kpi-value.pos { color: var(--green); }
.kpi-value.neg { color: var(--red); }
.kpi-value.neu { color: var(--blue); }
.kpi-value.yel { color: var(--accent3); }
.kpi-sub { font-size: 11px; color: var(--muted); margin-top: 6px; }

/* ── Charts row ── */
.charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 24px; }
@media(max-width:800px){ .charts-row { grid-template-columns: 1fr; } }

.chart-box {
  background: var(--card); border: 1px solid var(--border); padding: 20px;
  position: relative;
}
.chart-title {
  font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--muted);
  margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between;
}
.chart-title span { color: var(--text); }
.chart-wrap { position: relative; height: 200px; }

/* ── Token table ── */
.section-title {
  font-family: var(--mono); font-size: 10px; letter-spacing: 3px; color: var(--muted);
  margin-bottom: 12px; display: flex; align-items: center; gap: 10px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.table-wrap { overflow-x: auto; margin-bottom: 24px; }
table { width: 100%; border-collapse: collapse; }
thead th {
  font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--muted);
  text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
thead th.r { text-align: right; }
tbody tr { border-bottom: 1px solid rgba(28,37,53,0.6); transition: background 0.12s; }
tbody tr:hover { background: rgba(125,249,170,0.03); }
tbody td { padding: 11px 12px; font-size: 13px; }
tbody td.r { text-align: right; font-family: var(--mono); font-size: 12px; }
tbody td.mono { font-family: var(--mono); font-size: 12px; }

.token-cell { display: flex; align-items: center; gap: 10px; }
.token-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.token-sym { font-weight: 600; font-size: 13px; }
.token-chain { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 1px; }

.pnl-bar-wrap { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
.pnl-bar {
  width: 60px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
}
.pnl-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }

/* ── TX timeline ── */
.tx-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 24px; }
.tx-item {
  background: var(--card); border: 1px solid var(--border); padding: 12px 16px;
  display: flex; align-items: center; gap: 14px; transition: border-color 0.15s;
}
.tx-item:hover { border-color: var(--muted); }

.tx-type {
  font-family: var(--mono); font-size: 9px; letter-spacing: 1px; padding: 3px 8px;
  border: 1px solid; flex-shrink: 0; width: 50px; text-align: center;
}
.tx-type.buy { border-color: var(--green); color: var(--green); }
.tx-type.sell { border-color: var(--red); color: var(--red); }
.tx-type.swap { border-color: var(--blue); color: var(--blue); }
.tx-type.transfer { border-color: var(--muted); color: var(--muted); }
.tx-type.fee { border-color: var(--accent3); color: var(--accent3); }

.tx-info { flex: 1; min-width: 0; }
.tx-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-meta { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }

.tx-amounts { text-align: right; flex-shrink: 0; }
.tx-usd { font-family: var(--mono); font-size: 13px; }
.tx-usd.pos { color: var(--green); }
.tx-usd.neg { color: var(--red); }
.tx-gas { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }

.tx-chain-badge {
  font-family: var(--mono); font-size: 9px; padding: 2px 6px;
  border: 1px solid var(--border); color: var(--muted); flex-shrink: 0;
}

/* ── Daily breakdown ── */
.daily-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 24px; }
.day-row {
  display: flex; align-items: center; gap: 12px; padding: 10px 14px;
  background: var(--card); border: 1px solid var(--border);
}
.day-date { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 100px; flex-shrink: 0; }
.day-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; position: relative; }
.day-bar { height: 100%; border-radius: 3px; transition: width 0.5s; }
.day-pnl { font-family: var(--mono); font-size: 12px; width: 90px; text-align: right; flex-shrink: 0; }
.day-txcount { font-family: var(--mono); font-size: 10px; color: var(--muted); width: 40px; text-align: right; flex-shrink: 0; }

/* ── States ── */
.loading-wrap { text-align: center; padding: 80px 20px; }
.spinner {
  width: 40px; height: 40px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 3px; }
.loading-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 8px; }

.empty-wrap { text-align: center; padding: 60px 20px; }
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }
.empty-text { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 2px; }

.error-box {
  background: rgba(255,107,107,0.05); border: 1px solid rgba(255,107,107,0.3);
  padding: 12px 16px; font-family: var(--mono); font-size: 11px; color: var(--red);
  letter-spacing: 1px; margin-bottom: 16px; display: none;
}

/* ── Tabs ── */
.view-tabs { display: flex; gap: 4px; margin-bottom: 16px; }
.view-tab {
  font-family: var(--mono); font-size: 10px; letter-spacing: 2px; padding: 7px 14px;
  background: transparent; border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.view-tab:hover { color: var(--text); border-color: var(--muted); }
.view-tab.active { color: var(--accent); border-color: var(--accent); background: rgba(125,249,170,0.05); }

.view-content { display: none; }
.view-content.active { display: block; }

/* Auto refresh */
.auto-row { display: flex; align-items: center; gap: 10px; }
.toggle-wrap { position: relative; width: 34px; height: 18px; cursor: pointer; }
.toggle-wrap input { display: none; }
.t-track { position: absolute; inset: 0; background: var(--border); border: 1px solid var(--muted); transition: 0.2s; }
.toggle-wrap input:checked + .t-track { background: rgba(125,249,170,0.15); border-color: var(--accent); }
.t-thumb { position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; background: var(--muted); transition: 0.2s; }
.toggle-wrap input:checked ~ .t-thumb { left: 18px; background: var(--accent); }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="brand">
      <div class="brand-icon">P</div>
      <div>
        <div class="brand-name">PNL_BOT</div>
        <div class="brand-sub">TRANSACTION ANALYTICS ENGINE</div>
      </div>
    </div>
    <div class="header-actions">
      <div class="badge-live">
        <div class="dot-live" id="liveDot"></div>
        <span id="lastUpdateLabel">NOT SYNCED</span>
      </div>
      <button class="btn btn-ghost" onclick="exportCSV()">↓ CSV</button>
      <button class="btn btn-primary" id="btnScan" onclick="runBot()">▶ RUN BOT</button>
    </div>
  </div>

  <!-- Config -->
  <div class="config">
    <div class="config-label">SETUP</div>
    <div class="wallets-area">
      <div id="walletsList">
        <div class="wallet-row">
          <input class="wallet-input" type="text" placeholder="0x... wallet address (EVM) or Solana address" />
          <button class="btn-sm" onclick="removeWallet(this)">×</button>
        </div>
      </div>
      <button class="btn-add" onclick="addWallet()">+ ADD WALLET</button>
    </div>
    <div class="config-grid">
      <div class="field">
        <label>ALCHEMY API KEY</label>
        <input type="password" id="alchemyKey" placeholder="for ETH / Base / ARB / OP / POL" />
      </div>
      <div class="field">
        <label>HELIUS API KEY</label>
        <input type="password" id="heliusKey" placeholder="for Solana" />
      </div>
      <div class="field">
        <label>ETHERSCAN API KEY (optional)</label>
        <input type="password" id="etherscanKey" placeholder="for deeper EVM tx history" />
      </div>
    </div>
    <div class="config-bottom">
      <div class="field">
        <label>HISTORY DEPTH</label>
        <select id="historyDepth">
          <option value="100">Last 100 tx</option>
          <option value="500" selected>Last 500 tx</option>
          <option value="1000">Last 1000 tx</option>
          <option value="9999">All time</option>
        </select>
      </div>
      <div class="field">
        <label>BASE CURRENCY</label>
        <select id="baseCurrency">
          <option value="usd">USD</option>
          <option value="eur">EUR</option>
          <option value="aud">AUD</option>
        </select>
      </div>
      <div class="auto-row">
        <span style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:2px;">AUTO</span>
        <label class="toggle-wrap">
          <input type="checkbox" id="autoToggle" onchange="toggleAuto()" />
          <div class="t-track"></div>
          <div class="t-thumb"></div>
        </label>
        <select id="autoInterval" style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:10px;padding:4px 8px;outline:none;">
          <option value="60">1m</option>
          <option value="300" selected>5m</option>
          <option value="900">15m</option>
          <option value="3600">1h</option>
        </select>
      </div>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <!-- Period selector -->
  <div class="period-bar" id="periodBar" style="display:none;">
    <button class="period-btn active" onclick="setPeriod('1d',this)">24H</button>
    <button class="period-btn" onclick="setPeriod('7d',this)">7D</button>
    <button class="period-btn" onclick="setPeriod('30d',this)">30D</button>
    <button class="period-btn" onclick="setPeriod('90d',this)">90D</button>
    <button class="period-btn" onclick="setPeriod('all',this)">ALL</button>
  </div>

  <!-- Loading -->
  <div class="loading-wrap" id="loadingWrap" style="display:none;">
    <div class="spinner"></div>
    <div class="loading-msg" id="loadingMsg">INITIALIZING BOT...</div>
    <div class="loading-sub" id="loadingSub"></div>
  </div>

  <!-- Main content (hidden until data) -->
  <div id="mainContent" style="display:none;">

    <!-- KPIs -->
    <div class="kpis" id="kpiRow"></div>

    <!-- Charts -->
    <div class="charts-row">
      <div class="chart-box">
        <div class="chart-title">CUMULATIVE PNL <span id="chartPeriodLabel">24H</span></div>
        <div class="chart-wrap"><canvas id="pnlChart"></canvas></div>
      </div>
      <div class="chart-box">
        <div class="chart-title">TX BREAKDOWN</div>
        <div class="chart-wrap"><canvas id="typeChart"></canvas></div>
      </div>
    </div>

    <!-- View tabs -->
    <div class="view-tabs">
      <button class="view-tab active" onclick="switchView('tokens',this)">BY TOKEN</button>
      <button class="view-tab" onclick="switchView('daily',this)">DAILY</button>
      <button class="view-tab" onclick="switchView('txlist',this)">TRANSACTIONS</button>
    </div>

    <!-- BY TOKEN -->
    <div class="view-content active" id="view-tokens">
      <div class="section-title">TOKEN PnL</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>TOKEN</th>
              <th class="r">BUYS</th>
              <th class="r">SELLS</th>
              <th class="r">FEES PAID</th>
              <th class="r">REALIZED PnL</th>
              <th class="r">UNREALIZED</th>
              <th class="r">TOTAL PnL</th>
              <th class="r">WIN RATE</th>
            </tr>
          </thead>
          <tbody id="tokenTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- DAILY -->
    <div class="view-content" id="view-daily">
      <div class="section-title">DAILY BREAKDOWN</div>
      <div class="daily-list" id="dailyList"></div>
    </div>

    <!-- TX LIST -->
    <div class="view-content" id="view-txlist">
      <div class="section-title">TRANSACTION HISTORY</div>
      <div class="tx-list" id="txList"></div>
    </div>

  </div>

  <!-- Empty state -->
  <div class="empty-wrap" id="emptyWrap">
    <div class="empty-icon">⟳</div>
    <div class="empty-text">ENTER WALLET + API KEYS → RUN BOT</div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let allTxs = [];
let tokenStats = {};
let dailyStats = {};
let currentPeriod = '1d';
let autoTimer = null;
let pnlChart = null;
let typeChart = null;

const CHAIN_COLORS = {
  eth: '#627EEA', base: '#0052FF', arb: '#28A0F0', op: '#FF0420',
  pol: '#8247E5', avax: '#E84142', bsc: '#F3BA2F', sol: '#9945FF',
  megaeth: '#00FF88', hype: '#40E0D0'
};

// ─────────────────────────────────────────────
// WALLET MANAGEMENT
// ─────────────────────────────────────────────
function addWallet() {
  const row = document.createElement('div');
  row.className = 'wallet-row';
  row.innerHTML = `<input class="wallet-input" type="text" placeholder="0x... or Solana address"/><button class="btn-sm" onclick="removeWallet(this)">×</button>`;
  document.getElementById('walletsList').appendChild(row);
}
function removeWallet(btn) {
  if (document.querySelectorAll('.wallet-row').length > 1) btn.parentElement.remove();
}
function getWallets() {
  return [...document.querySelectorAll('.wallet-input')].map(i=>i.value.trim()).filter(v=>v.length>5);
}

// ─────────────────────────────────────────────
// AUTO REFRESH
// ─────────────────────────────────────────────
function toggleAuto() {
  clearInterval(autoTimer);
  if (document.getElementById('autoToggle').checked) {
    const secs = parseInt(document.getElementById('autoInterval').value);
    autoTimer = setInterval(runBot, secs * 1000);
  }
}

// ─────────────────────────────────────────────
// PERIOD
// ─────────────────────────────────────────────
function setPeriod(p, btn) {
  currentPeriod = p;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const labels = { '1d':'24H','7d':'7D','30d':'30D','90d':'90D','all':'ALL TIME' };
  document.getElementById('chartPeriodLabel').textContent = labels[p];
  renderAll();
}

function filterByPeriod(txs) {
  if (currentPeriod === 'all') return txs;
  const days = { '1d':1,'7d':7,'30d':30,'90d':90 }[currentPeriod];
  const cutoff = Date.now() - days * 86400000;
  return txs.filter(tx => tx.timestamp * 1000 >= cutoff);
}

// ─────────────────────────────────────────────
// MAIN BOT
// ─────────────────────────────────────────────
async function runBot() {
  const wallets = getWallets();
  if (!wallets.length) { showError('Add at least one wallet.'); return; }

  const alchemyKey = document.getElementById('alchemyKey').value.trim();
  const heliusKey = document.getElementById('heliusKey').value.trim();
  const etherscanKey = document.getElementById('etherscanKey').value.trim();
  const depth = parseInt(document.getElementById('historyDepth').value);

  if (!alchemyKey && !heliusKey && !etherscanKey) {
    showError('Add at least one API key (Alchemy for EVM, Helius for Solana).');
    return;
  }

  showLoading('FETCHING TRANSACTIONS...');
  hideError();
  allTxs = [];

  try {
    for (const wallet of wallets) {
      const isSolana = !wallet.startsWith('0x');
      setLoadingSub(`Wallet: ${wallet.slice(0,8)}...`);

      if (!isSolana) {
        if (alchemyKey) {
          setLoadingMsg('SCANNING EVM CHAINS...');
          await fetchAlchemyTxs(wallet, alchemyKey, depth);
        }
        if (etherscanKey) {
          setLoadingMsg('SCANNING ETHERSCAN...');
          await fetchEtherscanTxs(wallet, etherscanKey, depth);
        }
      } else {
        if (heliusKey) {
          setLoadingMsg('SCANNING SOLANA...');
          await fetchSolanaTxs(wallet, heliusKey, depth);
        }
      }
    }

    setLoadingMsg('CALCULATING PnL...');
    await enrichWithPrices();
    computeStats();
    renderAll();

    document.getElementById('liveDot').classList.add('on');
    document.getElementById('lastUpdateLabel').textContent = 'UPDATED ' + new Date().toLocaleTimeString();
    showMain();

  } catch(e) {
    showError('Bot error: ' + e.message);
    console.error(e);
  } finally {
    hideLoading();
  }
}

// ─────────────────────────────────────────────
// ALCHEMY — Transfers API (full tx history)
// ─────────────────────────────────────────────
const EVM_CHAINS = [
  { id: 'eth',  net: 'eth-mainnet',      name: 'ETH'  },
  { id: 'base', net: 'base-mainnet',     name: 'BASE' },
  { id: 'arb',  net: 'arb-mainnet',      name: 'ARB'  },
  { id: 'op',   net: 'opt-mainnet',      name: 'OP'   },
  { id: 'pol',  net: 'polygon-mainnet',  name: 'POL'  },
];

async function fetchAlchemyTxs(wallet, apiKey, maxCount) {
  for (const chain of EVM_CHAINS) {
    setLoadingSub(`${chain.name} — ${wallet.slice(0,8)}...`);
    const url = `https://${chain.net}.g.alchemy.com/v2/${apiKey}`;
    try {
      // Get sent + received asset transfers
      const [sentRes, recvRes] = await Promise.all([
        alchemyTransfers(url, wallet, 'from', maxCount),
        alchemyTransfers(url, wallet, 'to', maxCount),
      ]);

      const txMap = {};

      for (const tx of [...(sentRes||[]), ...(recvRes||[])]) {
        const key = tx.hash;
        if (!txMap[key]) {
          txMap[key] = {
            hash: tx.hash,
            chain: chain.id,
            chainName: chain.name,
            timestamp: tx.metadata?.blockTimestamp ? Math.floor(new Date(tx.metadata.blockTimestamp).getTime()/1000) : 0,
            blockNum: tx.blockNum,
            from: tx.from,
            to: tx.to,
            asset: tx.asset || 'ETH',
            tokenAddress: tx.rawContract?.address || null,
            value: parseFloat(tx.value) || 0,
            valueUSD: null,
            gasCostETH: 0,
            gasCostUSD: null,
            type: 'transfer',
            category: tx.category,
            wallet,
          };
        }
      }

      allTxs.push(...Object.values(txMap));
    } catch(e) {
      console.warn(`Alchemy ${chain.name} error:`, e.message);
    }
  }
}

async function alchemyTransfers(url, address, direction, maxCount) {
  const param = direction === 'from'
    ? { fromAddress: address }
    : { toAddress: address };

  const body = {
    jsonrpc: '2.0', id: 1,
    method: 'alchemy_getAssetTransfers',
    params: [{
      ...param,
      category: ['external','erc20','erc721','erc1155'],
      withMetadata: true,
      excludeZeroValue: true,
      maxCount: `0x${Math.min(maxCount, 1000).toString(16)}`,
      order: 'desc',
    }]
  };

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const data = await res.json();
  return data.result?.transfers || [];
}

// ─────────────────────────────────────────────
// ETHERSCAN fallback
// ─────────────────────────────────────────────
async function fetchEtherscanTxs(wallet, apiKey, maxCount) {
  try {
    const url = `https://api.etherscan.io/api?module=account&action=txlist&address=${wallet}&startblock=0&endblock=99999999&sort=desc&apikey=${apiKey}&offset=${Math.min(maxCount,10000)}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.result && Array.isArray(data.result)) {
      for (const tx of data.result) {
        // Check if already fetched from Alchemy
        if (allTxs.find(t => t.hash === tx.hash)) continue;
        const gasUsed = parseInt(tx.gasUsed);
        const gasPrice = parseInt(tx.gasPrice);
        const gasCostETH = (gasUsed * gasPrice) / 1e18;
        allTxs.push({
          hash: tx.hash,
          chain: 'eth',
          chainName: 'ETH',
          timestamp: parseInt(tx.timeStamp),
          from: tx.from,
          to: tx.to,
          asset: 'ETH',
          tokenAddress: null,
          value: parseInt(tx.value) / 1e18,
          valueUSD: null,
          gasCostETH,
          gasCostUSD: null,
          type: 'transfer',
          isError: tx.isError === '1',
          wallet,
        });
      }
    }
  } catch(e) {
    console.warn('Etherscan error:', e.message);
  }
}

// ─────────────────────────────────────────────
// SOLANA via Helius
// ─────────────────────────────────────────────
async function fetchSolanaTxs(wallet, apiKey, maxCount) {
  try {
    const limit = Math.min(maxCount, 100);
    const res = await fetch(`https://api.helius.xyz/v0/addresses/${wallet}/transactions?api-key=${apiKey}&limit=${limit}&type=SWAP`);
    const swaps = await res.json();

    const res2 = await fetch(`https://api.helius.xyz/v0/addresses/${wallet}/transactions?api-key=${apiKey}&limit=${limit}`);
    const allSol = await res2.json();

    const seen = new Set();
    for (const tx of [...(Array.isArray(swaps)?swaps:[]), ...(Array.isArray(allSol)?allSol:[])]) {
      if (seen.has(tx.signature)) continue;
      seen.add(tx.signature);
      allTxs.push({
        hash: tx.signature,
        chain: 'sol',
        chainName: 'SOL',
        timestamp: tx.timestamp || 0,
        from: wallet,
        to: tx.instructions?.[0]?.accounts?.[1] || '',
        asset: tx.tokenTransfers?.[0]?.mint || 'SOL',
        tokenAddress: tx.tokenTransfers?.[0]?.mint || null,
        value: tx.nativeTransfers?.[0]?.amount ? tx.nativeTransfers[0].amount / 1e9 : 0,
        valueUSD: null,
        gasCostSOL: (tx.fee || 0) / 1e9,
        gasCostUSD: null,
        type: tx.type === 'SWAP' ? 'swap' : 'transfer',
        description: tx.description || '',
        wallet,
      });
    }
  } catch(e) {
    console.warn('Helius error:', e.message);
  }
}

// ─────────────────────────────────────────────
// PRICE ENRICHMENT (CoinGecko free)
// ─────────────────────────────────────────────
const KNOWN_PRICES = {};
const SYMBOL_IDS = {
  ETH:'ethereum', SOL:'solana', BTC:'bitcoin', BNB:'binancecoin',
  AVAX:'avalanche-2', MATIC:'matic-network', ARB:'arbitrum', OP:'optimism',
  USDC:'usd-coin', USDT:'tether', DAI:'dai', WETH:'weth',
  LINK:'chainlink', UNI:'uniswap', AAVE:'aave',
};

async function enrichWithPrices() {
  // Get current prices for known assets
  const ids = Object.values(SYMBOL_IDS).join(',');
  try {
    const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
    const prices = await res.json();
    Object.entries(SYMBOL_IDS).forEach(([sym, id]) => {
      if (prices[id]) KNOWN_PRICES[sym] = prices[id].usd;
    });
  } catch(e) {}

  // Apply to txs
  for (const tx of allTxs) {
    const sym = tx.asset?.toUpperCase();
    if (KNOWN_PRICES[sym]) {
      tx.valueUSD = tx.value * KNOWN_PRICES[sym];
      if (tx.gasCostETH) tx.gasCostUSD = tx.gasCostETH * (KNOWN_PRICES['ETH'] || 0);
      if (tx.gasCostSOL) tx.gasCostUSD = tx.gasCostSOL * (KNOWN_PRICES['SOL'] || 0);
    }
    // Stablecoins = 1:1
    if (['USDC','USDT','DAI','BUSD','FRAX'].includes(sym)) {
      tx.valueUSD = tx.value;
    }
    // Classify tx type
    tx.type = classifyTx(tx);
  }
}

function classifyTx(tx) {
  const sym = tx.asset?.toUpperCase() || '';
  if (tx.type === 'swap') return 'swap';
  if (['USDC','USDT','DAI'].includes(sym)) return 'stable';
  if (tx.category === 'erc721' || tx.category === 'erc1155') return 'nft';
  if (tx.from?.toLowerCase() === getWallets()[0]?.toLowerCase()) return 'sell';
  return 'buy';
}

// ─────────────────────────────────────────────
// COMPUTE STATS (PnL, daily, per token)
// ─────────────────────────────────────────────
function computeStats() {
  tokenStats = {};
  dailyStats = {};

  for (const tx of allTxs) {
    // Per token
    const sym = tx.asset?.toUpperCase() || 'UNKNOWN';
    if (!tokenStats[sym]) {
      tokenStats[sym] = {
        symbol: sym, chain: tx.chainName, chainId: tx.chain,
        buys: 0, buyUSD: 0, sells: 0, sellUSD: 0,
        fees: 0, txCount: 0, wins: 0, losses: 0,
      };
    }
    const ts = tokenStats[sym];
    ts.txCount++;
    if (tx.type === 'buy' || (tx.from?.toLowerCase() !== tx.wallet?.toLowerCase())) {
      ts.buys += tx.value;
      ts.buyUSD += tx.valueUSD || 0;
    } else {
      ts.sells += tx.value;
      ts.sellUSD += tx.valueUSD || 0;
    }
    if (tx.gasCostUSD) ts.fees += tx.gasCostUSD;

    // Daily
    if (tx.timestamp) {
      const d = new Date(tx.timestamp * 1000);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      if (!dailyStats[key]) dailyStats[key] = { date: key, pnl: 0, fees: 0, txCount: 0, volume: 0 };
      dailyStats[key].txCount++;
      dailyStats[key].volume += tx.valueUSD || 0;
      dailyStats[key].fees += tx.gasCostUSD || 0;
    }
  }

  // Compute realized PnL per token (sell - buy)
  for (const ts of Object.values(tokenStats)) {
    ts.realizedPnL = ts.sellUSD - ts.buyUSD;
    ts.totalPnL = ts.realizedPnL - ts.fees;
    ts.winRate = ts.sells > 0 ? Math.min(100, Math.max(0, (ts.realizedPnL > 0 ? 100 : 0))) : null;
  }

  // Daily PnL = difference in value flows
  for (const ds of Object.values(dailyStats)) {
    const dayTxs = allTxs.filter(tx => {
      if (!tx.timestamp) return false;
      const d = new Date(tx.timestamp*1000);
      const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      return k === ds.date;
    });
    const inflow = dayTxs.filter(t=>t.from?.toLowerCase()!==t.wallet?.toLowerCase()).reduce((s,t)=>s+(t.valueUSD||0),0);
    const outflow = dayTxs.filter(t=>t.from?.toLowerCase()===t.wallet?.toLowerCase()).reduce((s,t)=>s+(t.valueUSD||0),0);
    ds.pnl = outflow - inflow;
  }
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function renderAll() {
  const filtered = filterByPeriod(allTxs);
  renderKPIs(filtered);
  renderPnLChart(filtered);
  renderTypeChart(filtered);
  renderTokenTable();
  renderDailyList();
  renderTxList(filtered);
}

function renderKPIs(txs) {
  const totalVolume = txs.reduce((s,t) => s+(t.valueUSD||0), 0);
  const totalFees = txs.reduce((s,t) => s+(t.gasCostUSD||0), 0);
  const inflow = txs.filter(t=>t.from?.toLowerCase()!==t.wallet?.toLowerCase()).reduce((s,t)=>s+(t.valueUSD||0),0);
  const outflow = txs.filter(t=>t.from?.toLowerCase()===t.wallet?.toLowerCase()).reduce((s,t)=>s+(t.valueUSD||0),0);
  const realizedPnL = outflow - inflow;
  const totalPnL = realizedPnL - totalFees;
  const txCount = txs.length;
  const winDays = Object.values(dailyStats).filter(d=>d.pnl>0).length;
  const totalDays = Object.keys(dailyStats).length;
  const winRate = totalDays > 0 ? Math.round(winDays/totalDays*100) : 0;

  const pnlClass = totalPnL >= 0 ? 'pos' : 'neg';
  const pnlSign = totalPnL >= 0 ? '+' : '';

  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi k-${totalPnL>=0?'green':'red'}">
      <div class="kpi-label">TOTAL PnL</div>
      <div class="kpi-value ${pnlClass}">${pnlSign}$${fmt(Math.abs(totalPnL))}</div>
      <div class="kpi-sub">after fees</div>
    </div>
    <div class="kpi k-blue">
      <div class="kpi-label">VOLUME</div>
      <div class="kpi-value neu">$${fmt(totalVolume)}</div>
      <div class="kpi-sub">${txCount} transactions</div>
    </div>
    <div class="kpi k-yellow">
      <div class="kpi-label">FEES PAID</div>
      <div class="kpi-value yel">$${fmt(totalFees)}</div>
      <div class="kpi-sub">gas costs</div>
    </div>
    <div class="kpi k-purple">
      <div class="kpi-label">WIN RATE</div>
      <div class="kpi-value" style="color:#A78BFA">${winRate}%</div>
      <div class="kpi-sub">${winDays}/${totalDays} profitable days</div>
    </div>
    <div class="kpi k-${realizedPnL>=0?'green':'red'}">
      <div class="kpi-label">REALIZED PnL</div>
      <div class="kpi-value ${realizedPnL>=0?'pos':'neg'}">${realizedPnL>=0?'+':''}$${fmt(Math.abs(realizedPnL))}</div>
      <div class="kpi-sub">before fees</div>
    </div>
  `;
}

function renderPnLChart(txs) {
  const canvas = document.getElementById('pnlChart');
  if (pnlChart) pnlChart.destroy();

  // Group by day
  const byDay = {};
  for (const tx of txs) {
    if (!tx.timestamp) continue;
    const d = new Date(tx.timestamp*1000);
    const key = `${d.getMonth()+1}/${d.getDate()}`;
    if (!byDay[key]) byDay[key] = 0;
    const isOut = tx.from?.toLowerCase() === tx.wallet?.toLowerCase();
    byDay[key] += isOut ? (tx.valueUSD||0) : -(tx.valueUSD||0);
  }

  const labels = Object.keys(byDay).reverse();
  const values = Object.values(byDay).reverse();
  let cumulative = 0;
  const cumulativeValues = values.map(v => { cumulative += v; return cumulative; });

  pnlChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: cumulativeValues,
        borderColor: cumulativeValues[cumulativeValues.length-1] >= 0 ? '#7DF9AA' : '#FF6B6B',
        backgroundColor: ctx => {
          const g = ctx.chart.ctx.createLinearGradient(0,0,0,200);
          const c = cumulativeValues[cumulativeValues.length-1] >= 0 ? '125,249,170' : '255,107,107';
          g.addColorStop(0, `rgba(${c},0.2)`);
          g.addColorStop(1, `rgba(${c},0)`);
          return g;
        },
        fill: true,
        tension: 0.4,
        pointRadius: labels.length > 20 ? 0 : 3,
        pointBackgroundColor: '#7DF9AA',
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#1c2535' }, ticks: { color: '#3D5070', font: { family: 'Share Tech Mono', size: 9 } } },
        y: { grid: { color: '#1c2535' }, ticks: { color: '#3D5070', font: { family: 'Share Tech Mono', size: 9 }, callback: v => '$'+fmt(v) } }
      }
    }
  });
}

function renderTypeChart(txs) {
  const canvas = document.getElementById('typeChart');
  if (typeChart) typeChart.destroy();

  const counts = {};
  for (const tx of txs) {
    counts[tx.type] = (counts[tx.type]||0) + 1;
  }

  const labels = Object.keys(counts);
  const data = Object.values(counts);
  const colors = { buy:'#7DF9AA', sell:'#FF6B6B', swap:'#60A5FA', transfer:'#3D5070', stable:'#FFD93D', nft:'#A78BFA', fee:'#F97316' };

  typeChart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: labels.map(l => colors[l] || '#3D5070'),
        borderColor: '#06080c',
        borderWidth: 3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { color: '#3D5070', font: { family: 'Share Tech Mono', size: 9 }, boxWidth: 10, padding: 10 } }
      },
      cutout: '65%',
    }
  });
}

function renderTokenTable() {
  const sorted = Object.values(tokenStats).sort((a,b) => Math.abs(b.totalPnL) - Math.abs(a.totalPnL));
  const maxAbs = Math.max(...sorted.map(t => Math.abs(t.totalPnL)), 1);

  let html = '';
  for (const t of sorted.slice(0,50)) {
    const pnlClass = t.totalPnL >= 0 ? 'pos' : 'neg';
    const barW = Math.round(Math.abs(t.totalPnL)/maxAbs*100);
    const barColor = t.totalPnL >= 0 ? 'var(--green)' : 'var(--red)';
    const chainColor = CHAIN_COLORS[t.chainId] || '#3D5070';
    html += `
      <tr>
        <td>
          <div class="token-cell">
            <div class="token-dot" style="background:${chainColor}"></div>
            <div>
              <div class="token-sym">${t.symbol}</div>
              <div class="token-chain">${t.chain}</div>
            </div>
          </div>
        </td>
        <td class="r">$${fmt(t.buyUSD)}</td>
        <td class="r">$${fmt(t.sellUSD)}</td>
        <td class="r" style="color:var(--accent3)">$${fmt(t.fees)}</td>
        <td class="r">
          <div class="pnl-bar-wrap">
            <div class="pnl-bar"><div class="pnl-bar-fill" style="width:${barW}%;background:${barColor}"></div></div>
            <span class="${pnlClass}">${t.realizedPnL>=0?'+':''}$${fmt(Math.abs(t.realizedPnL))}</span>
          </div>
        </td>
        <td class="r" style="color:var(--muted)">—</td>
        <td class="r"><strong class="${pnlClass}">${t.totalPnL>=0?'+':''}$${fmt(Math.abs(t.totalPnL))}</strong></td>
        <td class="r" style="color:${t.winRate>50?'var(--green)':'var(--red)'}">${t.winRate !== null ? t.winRate+'%' : '—'}</td>
      </tr>
    `;
  }
  document.getElementById('tokenTableBody').innerHTML = html || '<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:30px;font-family:var(--mono);font-size:11px;">NO TOKEN DATA</td></tr>';
}

function renderDailyList() {
  const days = Object.entries(dailyStats).sort((a,b) => b[0].localeCompare(a[0]));
  const maxAbsPnL = Math.max(...days.map(([,d]) => Math.abs(d.pnl)), 1);

  let html = '';
  for (const [date, d] of days.slice(0,60)) {
    const barW = Math.round(Math.abs(d.pnl)/maxAbsPnL*80);
    const barColor = d.pnl >= 0 ? 'var(--green)' : 'var(--red)';
    const pnlClass = d.pnl >= 0 ? 'pos' : 'neg';
    const displayDate = new Date(date+'T12:00:00').toLocaleDateString('en-AU',{month:'short',day:'numeric'});
    html += `
      <div class="day-row">
        <div class="day-date">${displayDate}</div>
        <div class="day-bar-wrap">
          <div class="day-bar" style="width:${barW}%;background:${barColor}"></div>
        </div>
        <div class="day-pnl ${pnlClass}">${d.pnl>=0?'+':''}$${fmt(Math.abs(d.pnl))}</div>
        <div class="day-txcount">${d.txCount}tx</div>
      </div>
    `;
  }
  document.getElementById('dailyList').innerHTML = html || '<div style="text-align:center;color:var(--muted);font-family:var(--mono);font-size:11px;padding:30px;">NO DAILY DATA</div>';
}

function renderTxList(txs) {
  const sorted = [...txs].sort((a,b) => b.timestamp - a.timestamp);
  let html = '';
  for (const tx of sorted.slice(0,100)) {
    const typeClass = { buy:'buy',sell:'sell',swap:'swap',transfer:'transfer',stable:'transfer',nft:'swap',fee:'fee' }[tx.type] || 'transfer';
    const isOut = tx.from?.toLowerCase() === tx.wallet?.toLowerCase();
    const usdClass = isOut ? 'neg' : 'pos';
    const usdSign = isOut ? '-' : '+';
    const date = tx.timestamp ? new Date(tx.timestamp*1000).toLocaleString('en-AU',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
    const chainColor = CHAIN_COLORS[tx.chain] || '#3D5070';
    const desc = tx.description || `${tx.asset} ${tx.type}`;
    html += `
      <div class="tx-item">
        <div class="tx-type ${typeClass}">${tx.type?.toUpperCase().slice(0,4)||'TX'}</div>
        <div class="tx-info">
          <div class="tx-title">${desc.slice(0,60)}</div>
          <div class="tx-meta">${date} · ${tx.hash?.slice(0,12)}...</div>
        </div>
        <div class="tx-amounts">
          <div class="tx-usd ${tx.valueUSD ? usdClass : ''}">${tx.valueUSD ? usdSign+'$'+fmt(tx.valueUSD) : fmtRaw(tx.value)+' '+tx.asset}</div>
          ${tx.gasCostUSD ? `<div class="tx-gas">fee $${fmt(tx.gasCostUSD)}</div>` : ''}
        </div>
        <div class="tx-chain-badge" style="border-color:${chainColor};color:${chainColor}">${tx.chainName}</div>
      </div>
    `;
  }
  document.getElementById('txList').innerHTML = html || '<div style="text-align:center;color:var(--muted);font-family:var(--mono);font-size:11px;padding:30px;">NO TRANSACTIONS</div>';
}

// ─────────────────────────────────────────────
// EXPORT CSV
// ─────────────────────────────────────────────
function exportCSV() {
  if (!allTxs.length) return;
  const headers = ['hash','chain','date','type','asset','value','valueUSD','gasCostUSD','from','to'];
  const rows = allTxs.map(tx => [
    tx.hash, tx.chainName,
    tx.timestamp ? new Date(tx.timestamp*1000).toISOString() : '',
    tx.type, tx.asset, tx.value, tx.valueUSD||'',
    tx.gasCostUSD||'', tx.from, tx.to
  ]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `pnl_export_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

// ─────────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────────
function switchView(name, btn) {
  document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.view-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-'+name).classList.add('active');
}

function showLoading(msg) {
  document.getElementById('loadingWrap').style.display = 'block';
  document.getElementById('loadingMsg').textContent = msg;
  document.getElementById('emptyWrap').style.display = 'none';
  document.getElementById('mainContent').style.display = 'none';
  document.getElementById('periodBar').style.display = 'none';
  document.getElementById('btnScan').disabled = true;
}
function hideLoading() {
  document.getElementById('loadingWrap').style.display = 'none';
  document.getElementById('btnScan').disabled = false;
}
function setLoadingMsg(m) { document.getElementById('loadingMsg').textContent = m; }
function setLoadingSub(m) { document.getElementById('loadingSub').textContent = m; }
function showMain() {
  document.getElementById('mainContent').style.display = 'block';
  document.getElementById('periodBar').style.display = 'flex';
  document.getElementById('emptyWrap').style.display = 'none';
}
function showError(msg) {
  const b = document.getElementById('errorBox');
  b.textContent = '⚠ ' + msg; b.style.display = 'block';
}
function hideError() { document.getElementById('errorBox').style.display = 'none'; }

function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '0';
  if (Math.abs(n) >= 1000000) return (n/1000000).toFixed(2)+'M';
  if (Math.abs(n) >= 1000) return (n/1000).toFixed(1)+'K';
  if (Math.abs(n) >= 1) return n.toFixed(2);
  return n.toFixed(4);
}
function fmtRaw(n) {
  if (!n) return '0';
  if (n >= 1000) return (n/1000).toFixed(2)+'K';
  if (n >= 1) return n.toFixed(4);
  return n.toFixed(6);
}
